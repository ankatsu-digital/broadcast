<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BROADCAST OS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#ff1a1a;--red2:#cc0000;--red-g:rgba(255,26,26,0.35);
  --amber:#ffb700;--amber-g:rgba(255,183,0,0.3);
  --green:#00ff88;--green-g:rgba(0,255,136,0.3);
  --cyan:#00ccff;--cyan-g:rgba(0,204,255,0.3);
  --bg:#080808;--bg2:#111;--bg3:#181818;--bg4:#1e1e1e;
  --b1:#222;--b2:#333;--b3:#444;
  --t1:#f0f0f0;--t2:#999;--t3:#555;
  --mono:'Share Tech Mono',monospace;
  --bar:'Barlow Condensed',sans-serif;
  --display:'Orbitron',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--bar);overflow:hidden;-webkit-font-smoothing:antialiased}

/* scanline */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.08) 3px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:9999}

/* ══ LOGIN ══ */
#login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:900;gap:0}
#login.hide{display:none}
.l-logo{font-family:var(--display);font-size:9px;font-weight:900;letter-spacing:.5em;color:var(--red);text-shadow:0 0 24px var(--red-g);margin-bottom:6px}
.l-sub{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.3em;margin-bottom:40px}
.l-box{background:var(--bg2);border:1px solid var(--b2);width:340px;padding:28px 28px 24px;position:relative}
.l-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red);box-shadow:0 0 12px var(--red-g)}
.l-label{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.2em;display:block;margin-bottom:5px}
.l-input{width:100%;background:var(--bg3);border:1px solid var(--b1);border-bottom:1px solid var(--b2);color:var(--t1);font-family:var(--mono);font-size:13px;padding:9px 11px;outline:none;margin-bottom:14px;transition:border-color .15s}
.l-input:focus{border-color:var(--red)}
.l-btn{width:100%;background:var(--red2);border:none;color:#fff;font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:.3em;padding:13px;cursor:pointer;transition:background .15s;margin-top:4px}
.l-btn:hover{background:var(--red)}
.l-err{font-family:var(--mono);font-size:10px;color:var(--red);margin-top:10px;min-height:14px;text-align:center}

/* ══ APP ══ */
#app{display:none;height:100vh;flex-direction:column}
#app.on{display:flex}

/* ── HEADER ── */
.hdr{height:38px;background:var(--bg2);border-bottom:2px solid var(--b1);display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0}
.hdr-logo{font-family:var(--display);font-size:9px;font-weight:900;letter-spacing:.4em;color:var(--red);text-shadow:0 0 10px var(--red-g)}
.hdr-div{width:1px;height:16px;background:var(--b2)}
.badge{font-family:var(--display);font-size:8px;font-weight:700;letter-spacing:.2em;padding:3px 9px;border:1px solid currentColor}
.badge.offair{color:var(--t3);border-color:var(--b2)}
.badge.standby{color:var(--amber);border-color:var(--amber);box-shadow:0 0 8px var(--amber-g)}
.badge.live{color:var(--red);border-color:var(--red);box-shadow:0 0 12px var(--red-g);animation:blk 1s step-start infinite}
.badge.cm{color:var(--cyan);border-color:var(--cyan);box-shadow:0 0 8px var(--cyan-g)}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.5}}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.hdr-clock{font-family:var(--mono);font-size:14px;color:var(--t2);letter-spacing:.08em}
.hdr-user{font-family:var(--mono);font-size:9px;color:var(--t3)}
.xbtn{font-family:var(--display);font-size:8px;font-weight:700;letter-spacing:.15em;padding:3px 9px;border:1px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer}
.xbtn:hover{border-color:var(--red);color:var(--red)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green-g);animation:spulse 2s ease-in-out infinite;flex-shrink:0}
.sync-dot.off{background:var(--red);box-shadow:0 0 6px var(--red-g);animation:none}
@keyframes spulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── BODY LAYOUT ── */
.body{flex:1;display:grid;grid-template-columns:1fr 300px;min-height:0;overflow:hidden}

/* ── LEFT COLUMN ── */
.left{display:flex;flex-direction:column;border-right:1px solid var(--b1);overflow:hidden}

/* ── CLOCK AREA ── */
.clock-area{background:var(--bg);padding:18px 24px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:32px;flex-shrink:0}
.clk-block{display:flex;flex-direction:column;align-items:center;gap:4px}
.clk-lbl{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:.3em}
.clk-wall{font-family:var(--display);font-size:clamp(36px,5vw,64px);font-weight:700;color:var(--t1);letter-spacing:.04em;line-height:1}
.clk-wall .cn{animation:cnblink 1s step-start infinite;color:var(--t3)}
@keyframes cnblink{0%,100%{opacity:1}50%{opacity:0}}
.clk-wall.zero{color:#fff;text-shadow:0 0 30px rgba(255,26,26,.7)}
.clk-div{width:1px;height:60px;background:var(--b2);flex-shrink:0}
.clk-elapsed{font-family:var(--display);font-size:clamp(28px,4vw,52px);font-weight:700;line-height:1;color:var(--red);text-shadow:0 0 16px var(--red-g)}
.clk-elapsed.paused{color:var(--amber);text-shadow:0 0 16px var(--amber-g)}
.clk-elapsed.off{color:var(--t3);text-shadow:none}
.clk-ms{font-family:var(--mono);font-size:clamp(11px,1.5vw,18px);color:var(--t3);letter-spacing:.15em;margin-top:2px}

/* ── CUE BAR ── */
.cue-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.cue-lbl{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:.25em;margin-right:4px}
.cue-btn{font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:.1em;width:46px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;transition:all .12s;flex-shrink:0}
.cue-btn:hover{border-color:var(--b3);color:var(--t2)}
.cue-btn.c-stby{border-color:var(--amber)!important;color:var(--amber)!important;box-shadow:0 0 10px var(--amber-g);background:rgba(255,183,0,.06)}
.cue-btn.c-num{border-color:var(--red)!important;color:var(--red)!important;box-shadow:0 0 12px var(--red-g);background:rgba(255,26,26,.08);font-size:16px}
.cue-btn.c-q{border-color:var(--green)!important;color:var(--green)!important;box-shadow:0 0 16px var(--green-g);background:rgba(0,255,136,.08);animation:qpulse .6s ease-in-out infinite alternate}
@keyframes qpulse{from{box-shadow:0 0 8px var(--green-g)}to{box-shadow:0 0 24px rgba(0,255,136,.8)}}

/* ── SEGMENT TABLE ── */
.seg-wrap{flex:1;overflow-y:auto;min-height:0}
.seg-wrap::-webkit-scrollbar{width:3px}
.seg-wrap::-webkit-scrollbar-thumb{background:var(--b2)}
.seg-hdr{display:grid;grid-template-columns:32px 1fr 64px 56px 72px;padding:6px 12px;border-bottom:1px solid var(--b1);position:sticky;top:0;background:var(--bg3);z-index:5}
.seg-hdr span{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:.2em;text-transform:uppercase}
.seg-row{display:grid;grid-template-columns:32px 1fr 64px 56px 72px;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;align-items:center;transition:background .1s}
.seg-row:hover{background:rgba(255,255,255,.03)}
.seg-row.act{background:rgba(255,26,26,.05);border-bottom:1px solid rgba(255,26,26,.15)}
.s-num{font-family:var(--mono);font-size:10px;color:var(--t3)}
.s-name{font-family:var(--bar);font-size:15px;font-weight:600;color:var(--t1);letter-spacing:.03em}
.seg-row.act .s-name{color:var(--red)}
.s-time{font-family:var(--mono);font-size:10px;color:var(--t2)}
.s-len{font-family:var(--mono);font-size:10px;color:var(--t2)}
.s-diff{font-family:var(--mono);font-size:10px}
.s-diff.over{color:var(--red)}.s-diff.under{color:var(--green)}.s-diff.ok{color:var(--t3)}
.seg-add-row{padding:8px 12px;border-top:1px solid var(--b1)}
.seg-add-btn{font-family:var(--mono);font-size:9px;letter-spacing:.2em;padding:6px;width:100%;border:1px solid var(--b1);background:transparent;color:var(--t3);cursor:pointer}
.seg-add-btn:hover{border-color:var(--b2);color:var(--t2)}

/* ── RIGHT PANEL ── */
.right{background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto;padding:12px;gap:10px}
.right::-webkit-scrollbar{width:3px}
.right::-webkit-scrollbar-thumb{background:var(--b2)}
.ctrl-box{border:1px solid var(--b1);background:var(--bg3);padding:10px 10px 8px}
.ctrl-title{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:.3em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--b1)}
.cbtn{width:100%;font-family:var(--display);font-size:9px;font-weight:700;letter-spacing:.18em;padding:11px 8px;border:1px solid;background:transparent;cursor:pointer;text-transform:uppercase;margin-bottom:6px;transition:all .12s;position:relative}
.cbtn:last-child{margin-bottom:0}
.cbtn:disabled{opacity:.25;cursor:not-allowed;pointer-events:none}
.cbtn::after{content:'';position:absolute;inset:0;background:currentColor;opacity:0;transition:opacity .12s}
.cbtn:hover::after{opacity:.07}
.cbtn.go{border-color:var(--red);color:var(--red)}
.cbtn.go.active{background:var(--red2);color:#fff;box-shadow:0 0 18px var(--red-g)}
.cbtn.stby{border-color:var(--amber);color:var(--amber)}
.cbtn.pau{border-color:var(--amber);color:var(--amber)}
.cbtn.cm{border-color:var(--cyan);color:var(--cyan)}
.cbtn.rst{border-color:var(--b2);color:var(--t3)}
.sq-btn{width:100%;font-family:var(--mono);font-size:10px;padding:7px 8px;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer;text-align:left;transition:all .1s;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sq-btn:last-child{margin-bottom:0}
.sq-btn:hover{border-color:var(--b2);color:var(--t1)}
.sq-btn.act{border-color:var(--red);color:var(--red);background:rgba(255,26,26,.06)}
.sys-row{font-family:var(--mono);font-size:9px;color:var(--t3);display:flex;align-items:center;gap:6px;margin-bottom:5px}
.sys-row:last-child{margin-bottom:0}

/* ── STATUS BAR ── */
.sbar{height:26px;background:var(--bg2);border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 14px;gap:18px;flex-shrink:0}
.sinfo{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.15em}
.sinfo span{color:var(--t2)}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:800}
.moverlay.on{display:flex}
.mbox{background:var(--bg2);border:1px solid var(--b2);padding:22px;width:340px;position:relative}
.mbox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--amber)}
.mtitle{font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:.2em;margin-bottom:14px}
.mgrid{display:grid;grid-template-columns:1fr 72px 64px;gap:6px;margin-bottom:4px}
.minput{background:var(--bg3);border:1px solid var(--b1);color:var(--t1);font-family:var(--mono);font-size:12px;padding:8px 9px;outline:none;width:100%}
.minput:focus{border-color:var(--amber)}
.mhlbl{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:.15em;text-align:center;margin-bottom:10px}
.mrow{display:flex;gap:6px}
.mbtn{flex:1;font-family:var(--display);font-size:9px;font-weight:700;letter-spacing:.2em;padding:10px;border:1px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer}
.mbtn.ok{border-color:var(--amber);color:var(--amber)}
.mbtn:hover{background:rgba(255,255,255,.04)}

/* Mobile */
@media(max-width:700px){
  .body{grid-template-columns:1fr}
  .right{display:none}
  .clock-area{padding:12px 14px;gap:16px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="l-logo">BROADCAST OS</div>
  <div class="l-sub">放送進行管理システム v2.0</div>
  <div class="l-box">
    <label class="l-label">EMAIL</label>
    <input type="email" id="lEmail" class="l-input" placeholder="operator@school.ac.jp" autocomplete="email">
    <label class="l-label">PASSWORD</label>
    <input type="password" id="lPass" class="l-input" placeholder="••••••••" autocomplete="current-password">
    <button class="l-btn" id="lBtn">AUTHENTICATE →</button>
    <div class="l-err" id="lErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-logo">BROADCAST OS</div>
    <div class="hdr-div"></div>
    <div class="badge offair" id="badge">OFF AIR</div>
    <div class="sync-dot" id="sdot"></div>
    <div class="hdr-r">
      <div class="hdr-clock" id="hdrClk">--:--:--</div>
      <div class="hdr-user" id="hdrUser"></div>
      <button class="xbtn" id="logoutBtn">LOGOUT</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">
    <!-- LEFT -->
    <div class="left">
      <!-- CLOCK -->
      <div class="clock-area">
        <div class="clk-block">
          <div class="clk-lbl">WALL CLOCK</div>
          <div class="clk-wall" id="clkWall">
            <span id="cwH">--</span><span class="cn">:</span><span id="cwM">--</span><span class="cn">:</span><span id="cwS">--</span>
          </div>
        </div>
        <div class="clk-div"></div>
        <div class="clk-block">
          <div class="clk-lbl">ELAPSED</div>
          <div class="clk-elapsed off" id="clkEl">--:--:--</div>
          <div class="clk-ms" id="clkMs">.---</div>
        </div>
      </div>

      <!-- CUE BAR -->
      <div class="cue-bar">
        <span class="cue-lbl">CUE</span>
        <button class="cue-btn" data-cue="stby">STBY</button>
        <button class="cue-btn" data-cue="5">5</button>
        <button class="cue-btn" data-cue="4">4</button>
        <button class="cue-btn" data-cue="3">3</button>
        <button class="cue-btn" data-cue="2">2</button>
        <button class="cue-btn" data-cue="1">1</button>
        <button class="cue-btn" data-cue="q">Q</button>
      </div>

      <!-- SEGMENT TABLE -->
      <div class="seg-wrap">
        <div class="seg-hdr">
          <span>#</span><span>SEGMENT</span><span>START</span><span>LEN</span><span>DIFF</span>
        </div>
        <div id="segRows"></div>
        <div class="seg-add-row">
          <button class="seg-add-btn" id="addSegBtn">＋ ADD SEGMENT</button>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <!-- BROADCAST CTRL -->
      <div class="ctrl-box">
        <div class="ctrl-title">BROADCAST CTRL</div>
        <button class="cbtn go" id="btnGo">▶ GO ON AIR</button>
        <button class="cbtn stby" id="btnStby">◈ STANDBY</button>
        <button class="cbtn pau" id="btnPau" disabled>⏸ PAUSE</button>
        <button class="cbtn cm" id="btnCm" disabled>▷ CM BREAK</button>
        <button class="cbtn rst" id="btnRst">⏹ RESET</button>
      </div>

      <!-- SEGMENTS -->
      <div class="ctrl-box">
        <div class="ctrl-title">SEGMENTS</div>
        <div id="sqList"></div>
      </div>

      <!-- SYSTEM -->
      <div class="ctrl-box">
        <div class="ctrl-title">SYSTEM</div>
        <div class="sys-row"><div class="sync-dot" id="sdot2"></div><span id="sLabel">FIRESTORE</span></div>
        <div class="sys-row" id="sysOffset">OFFSET: --</div>
        <div class="sys-row" id="sysUpd">UPDATED: --</div>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="sbar">
    <div class="sinfo">SEG: <span id="bSeg">--</span></div>
    <div class="sinfo">ELAPSED: <span id="bEl">--:--:--</span></div>
    <div class="sinfo">STATUS: <span id="bSt">OFF AIR</span></div>
    <div class="sinfo" style="margin-left:auto">BROADCAST OS 2.0</div>
  </div>
</div>

<!-- ADD SEGMENT MODAL -->
<div class="moverlay" id="modal">
  <div class="mbox">
    <div class="mtitle">ADD SEGMENT</div>
    <div class="mgrid">
      <input class="minput" id="mName" placeholder="セグメント名">
      <input class="minput" id="mStart" placeholder="00:00">
      <input class="minput" id="mLen" placeholder="05:00">
    </div>
    <div style="display:grid;grid-template-columns:1fr 72px 64px;gap:6px;margin-bottom:12px">
      <div class="mhlbl">NAME</div>
      <div class="mhlbl">START</div>
      <div class="mhlbl">LENGTH</div>
    </div>
    <div class="mrow">
      <button class="mbtn ok" id="mOk">ADD</button>
      <button class="mbtn" id="mCancel">CANCEL</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";

// ── Config ──────────────────────────────────────────────────────
const cfg = {
  apiKey:"AIzaSyArN55s79iTSsmtGNjKMXzm6BuLdlbUitY",
  authDomain:"broadcast-d1581.firebaseapp.com",
  projectId:"broadcast-d1581",
  storageBucket:"broadcast-d1581.firebasestorage.app",
  messagingSenderId:"695136212605",
  appId:"1:695136212605:web:f9ad30187e31967fd98314"
};
const fbApp = initializeApp(cfg);
const db    = getFirestore(fbApp);
const auth  = getAuth(fbApp);
const BDOC  = doc(db, "broadcast", "main");

// ── State ───────────────────────────────────────────────────────
let S = {
  status:"offair", startedAt:null, paused:false,
  pausedAt:null, pauseAccum:0, currentSegment:0,
  cue:null, segments:[], updatedAt:null
};

const DEF_SEGS = [
  {name:"オープニング",   start:"00:00",len:"03:00"},
  {name:"校長挨拶",       start:"03:00",len:"05:00"},
  {name:"生徒会報告",     start:"08:00",len:"10:00"},
  {name:"CM BREAK",      start:"18:00",len:"02:00"},
  {name:"クラブ活動報告", start:"20:00",len:"08:00"},
  {name:"エンディング",   start:"28:00",len:"02:00"},
];

// ── Time offset (書き込みゼロ) ──────────────────────────────────
// onSnapshot の updatedAt(serverTimestamp) と受信時刻の差で補正
let tOffset = 0;
let tSamples = [];
function applyOffset(serverMs) {
  if (!serverMs) return;
  const s = serverMs - Date.now();
  tSamples.push(s);
  if (tSamples.length > 8) tSamples.shift();
  const sorted = [...tSamples].sort((a,b)=>a-b);
  tOffset = sorted[Math.floor(sorted.length/2)];
  const el = document.getElementById("sysOffset");
  if (el) el.textContent = `OFFSET: ${tOffset>=0?"+":""}${Math.round(tOffset)}ms`;
}
function serverNow() { return Date.now() + tOffset; }

// ── Firestore listener ──────────────────────────────────────────
let unsub = null;

function startListener() {
  // 絶対に重複させない
  if (unsub) { unsub(); unsub = null; }
  unsub = onSnapshot(BDOC, snap => {
    setSyncUI(true);
    if (!snap.exists()) { initDoc(); return; }
    const d = snap.data();
    const sMs = d.updatedAt?.toMillis?.();
    if (sMs) applyOffset(sMs);

    S.status         = d.status        || "offair";
    S.startedAt      = d.startedAt?.toMillis?.() || null;
    S.paused         = d.paused        || false;
    S.pausedAt       = d.pausedAt?.toMillis?.() || null;
    S.pauseAccum     = d.pauseAccum    || 0;
    S.currentSegment = d.currentSegment ?? 0;
    S.cue            = d.cue           || null;
    S.segments       = d.segments?.length ? d.segments : DEF_SEGS;
    S.updatedAt      = sMs || null;

    const u = document.getElementById("sysUpd");
    if (u && sMs) u.textContent = `UPDATED: ${new Date(sMs).toLocaleTimeString("ja-JP")}`;

    renderAll();
  }, err => {
    console.error(err);
    setSyncUI(false);
  });
}

function stopListener() {
  if (unsub) { unsub(); unsub = null; }
}

async function initDoc() {
  await save({
    status:"offair", startedAt:null, paused:false, pausedAt:null,
    pauseAccum:0, currentSegment:0, cue:null, segments:DEF_SEGS
  });
}

// ── Save (merge) ────────────────────────────────────────────────
async function save(patch) {
  try {
    await setDoc(BDOC, { ...patch, updatedAt:serverTimestamp() }, { merge:true });
  } catch(e) { console.error("save error:", e); }
}

// ── Elapsed ─────────────────────────────────────────────────────
function getElapsedMs() {
  if (!S.startedAt) return 0;
  if (S.paused && S.pausedAt) {
    return Math.max(0, S.pausedAt - S.startedAt - S.pauseAccum);
  }
  return Math.max(0, serverNow() - S.startedAt - S.pauseAccum);
}

// ── Helpers ─────────────────────────────────────────────────────
function parseMmSs(str) {
  const p = (str||"00:00").split(":").map(Number);
  return (p[0]||0)*60 + (p[1]||0);
}
function fmtMmSs(s) {
  return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`;
}

// ── Render ──────────────────────────────────────────────────────
function renderAll() {
  renderBadge();
  renderButtons();
  renderCue();
  renderSegs();
  renderSqList();
  const cur = S.segments[S.currentSegment];
  document.getElementById("bSeg").textContent = cur ? cur.name : "--";
}

const BADGE_CLASS  = {offair:"offair",standby:"standby",live:"live",cm:"cm"};
const BADGE_LABEL  = {offair:"OFF AIR",standby:"STANDBY",live:"● LIVE",cm:"CM BREAK"};
function renderBadge() {
  const el = document.getElementById("badge");
  el.className = "badge " + (BADGE_CLASS[S.status]||"offair");
  el.textContent = BADGE_LABEL[S.status]||"OFF AIR";
  document.getElementById("bSt").textContent = BADGE_LABEL[S.status]||"OFF AIR";
}

function renderButtons() {
  const go  = document.getElementById("btnGo");
  const pau = document.getElementById("btnPau");
  const cm  = document.getElementById("btnCm");
  const st  = S.status;

  go.disabled  = false;
  pau.disabled = (st !== "live");
  cm.disabled  = (st !== "live" && st !== "standby");

  if (S.paused) {
    go.textContent = "▶ RESUME";
    go.className = "cbtn go";
  } else if (st === "live") {
    go.textContent = "● ON AIR";
    go.className = "cbtn go active";
  } else {
    go.textContent = "▶ GO ON AIR";
    go.className = "cbtn go";
  }
  pau.textContent = S.paused ? "▶ RESUME" : "⏸ PAUSE";
}

function renderCue() {
  document.querySelectorAll(".cue-btn").forEach(b => {
    const c = b.dataset.cue;
    b.className = "cue-btn";
    if (S.cue === c) {
      if (c === "stby") b.classList.add("c-stby");
      else if (c === "q") b.classList.add("c-q");
      else b.classList.add("c-num");
    }
  });
}

function renderSegs() {
  const wrap = document.getElementById("segRows");
  wrap.innerHTML = "";
  S.segments.forEach((seg, i) => {
    const isAct = i === S.currentSegment;
    const row = document.createElement("div");
    row.className = "seg-row" + (isAct ? " act" : "");

    let diffStr = "—", diffCls = "ok";
    if ((S.status === "live" || S.status === "cm") && isAct) {
      const el = getElapsedMs() / 1000;
      const segEl = el - parseMmSs(seg.start);
      const diff  = segEl - parseMmSs(seg.len);
      if (Math.abs(diff) < 5) { diffStr = "±0"; diffCls = "ok"; }
      else if (diff > 0) { diffStr = "+"+fmtMmSs(diff); diffCls = "over"; }
      else { diffStr = "-"+fmtMmSs(-diff); diffCls = "under"; }
    }

    row.innerHTML = `
      <span class="s-num">${String(i+1).padStart(2,"0")}</span>
      <span class="s-name">${seg.name}</span>
      <span class="s-time">${seg.start}</span>
      <span class="s-len">${seg.len}</span>
      <span class="s-diff ${diffCls}">${diffStr}</span>`;
    row.addEventListener("click", () => save({currentSegment:i}));
    wrap.appendChild(row);
  });
}

function renderSqList() {
  const wrap = document.getElementById("sqList");
  wrap.innerHTML = "";
  S.segments.forEach((seg, i) => {
    const b = document.createElement("button");
    b.className = "sq-btn" + (i === S.currentSegment ? " act" : "");
    b.textContent = `${String(i+1).padStart(2,"0")} ${seg.name}`;
    b.addEventListener("click", () => save({currentSegment:i}));
    wrap.appendChild(b);
  });
}

function setSyncUI(ok) {
  ["sdot","sdot2"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = "sync-dot" + (ok?"":" off");
  });
  const lb = document.getElementById("sLabel");
  if (lb) lb.textContent = ok ? "FIRESTORE SYNC" : "DISCONNECTED";
}

// ── RAF clock ───────────────────────────────────────────────────
let raf = null;
function clockLoop() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  document.getElementById("cwH").textContent = h;
  document.getElementById("cwM").textContent = m;
  document.getElementById("cwS").textContent = s;
  document.getElementById("hdrClk").textContent = `${h}:${m}:${s}`;

  const wall = document.getElementById("clkWall");
  now.getSeconds()===0 ? wall.classList.add("zero") : wall.classList.remove("zero");

  const elEl = document.getElementById("clkEl");
  const msEl = document.getElementById("clkMs");
  const isActive = S.status==="live" || S.status==="cm" || (S.paused && S.startedAt);

  if (isActive) {
    const eMs = getElapsedMs();
    const es  = Math.floor(eMs/1000);
    const ms  = Math.floor(eMs%1000);
    const hh  = Math.floor(es/3600);
    const mm  = Math.floor((es%3600)/60);
    const ss  = es%60;
    const str = hh>0 ? `${hh}:${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}` : `${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
    elEl.textContent = str;
    msEl.textContent = `.${String(ms).padStart(3,"0")}`;
    document.getElementById("bEl").textContent = str;
    elEl.className = "clk-elapsed" + (S.paused ? " paused" : "");
  } else {
    elEl.textContent = "--:--:--";
    elEl.className = "clk-elapsed off";
    msEl.textContent = ".---";
    document.getElementById("bEl").textContent = "--:--:--";
  }

  raf = requestAnimationFrame(clockLoop);
}

// ── Buttons ─────────────────────────────────────────────────────
document.getElementById("btnGo").addEventListener("click", async () => {
  if (S.paused && S.pausedAt) {
    const added = serverNow() - S.pausedAt;
    await save({status:"live", paused:false, pausedAt:null, pauseAccum:S.pauseAccum+added});
  } else if (S.status !== "live") {
    await save({status:"live", startedAt:serverTimestamp(), paused:false, pausedAt:null, pauseAccum:0});
  }
});

document.getElementById("btnStby").addEventListener("click", () => save({status:"standby",paused:false}));

document.getElementById("btnPau").addEventListener("click", async () => {
  if (S.paused) {
    const added = serverNow() - S.pausedAt;
    await save({status:"live", paused:false, pausedAt:null, pauseAccum:S.pauseAccum+added});
  } else {
    await save({status:"live", paused:true, pausedAt:serverTimestamp()});
  }
});

document.getElementById("btnCm").addEventListener("click", () => save({status:"cm"}));

document.getElementById("btnRst").addEventListener("click", async () => {
  if (!confirm("放送をリセットしますか？")) return;
  await save({status:"offair",startedAt:null,paused:false,pausedAt:null,pauseAccum:0,currentSegment:0,cue:null});
});

document.querySelectorAll(".cue-btn").forEach(b => {
  b.addEventListener("click", () => {
    const c = b.dataset.cue;
    save({cue: S.cue===c ? null : c});
  });
});

// Add segment
document.getElementById("addSegBtn").addEventListener("click", () => {
  document.getElementById("modal").classList.add("on");
});
document.getElementById("mCancel").addEventListener("click", () => {
  document.getElementById("modal").classList.remove("on");
});
document.getElementById("modal").addEventListener("click", e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove("on");
});
document.getElementById("mOk").addEventListener("click", async () => {
  const name  = document.getElementById("mName").value.trim()||"Untitled";
  const start = document.getElementById("mStart").value.trim()||"00:00";
  const len   = document.getElementById("mLen").value.trim()||"05:00";
  await save({segments:[...S.segments,{name,start,len}]});
  document.getElementById("modal").classList.remove("on");
  document.getElementById("mName").value="";
  document.getElementById("mStart").value="";
  document.getElementById("mLen").value="";
});

// ── Auth ─────────────────────────────────────────────────────────
document.getElementById("lBtn").addEventListener("click", async () => {
  const e   = document.getElementById("lEmail").value.trim();
  const p   = document.getElementById("lPass").value;
  const err = document.getElementById("lErr");
  err.textContent = "";
  try {
    await signInWithEmailAndPassword(auth, e, p);
  } catch(ex) {
    const m = {
      "auth/user-not-found":"ユーザーが見つかりません",
      "auth/wrong-password":"パスワードが違います",
      "auth/invalid-email":"メールアドレスの形式が違います",
      "auth/invalid-credential":"認証情報が無効です",
      "auth/too-many-requests":"試行回数が多すぎます。しばらく待ってください",
    };
    err.textContent = m[ex.code] || `エラー: ${ex.message}`;
  }
});
document.getElementById("lPass").addEventListener("keydown", e => {
  if (e.key==="Enter") document.getElementById("lBtn").click();
});
document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("login").classList.add("hide");
    document.getElementById("app").classList.add("on");
    document.getElementById("hdrUser").textContent = user.email;
    startListener();        // 重複防止済み
    if (!raf) clockLoop();
  } else {
    document.getElementById("login").classList.remove("hide");
    document.getElementById("app").classList.remove("on");
    stopListener();
    if (raf) { cancelAnimationFrame(raf); raf=null; }
    setSyncUI(false);
    // Stateリセット
    S = {status:"offair",startedAt:null,paused:false,pausedAt:null,
         pauseAccum:0,currentSegment:0,cue:null,segments:[],updatedAt:null};
  }
});

// F = fullscreen
document.addEventListener("keydown", e => {
  if (e.key==="f"||e.key==="F") {
    document.fullscreenElement
      ? document.exitFullscreen()
      : document.documentElement.requestFullscreen().catch(()=>{});
  }
});
</script>
